<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internships — InternHub</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}"/>
</head>
<body>

<div id="navbar"></div>

<!-- Page Hero -->
<div class="page-hero">
  <div class="page-hero__inner">
    <div>
      <h1 class="page-title">Available Internships</h1>
      <p class="page-sub" id="countLabel">Loading opportunities...</p>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by title or company..." oninput="applyFilters()"/>
      </div>
      <button class="icon-btn" id="toggleRecommended" onclick="toggleRecommended()" title="Recommended">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="7" y2="18"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="listings-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-card">
      <h3>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        Categories
      </h3>
      <div class="filter-list" id="filterList"></div>
    </div>
    <div class="promo-card">
      <h3>Get Verified!</h3>
      <p>Take a skill assessment to increase your chances of getting hired by 3x.</p>
      <a href="/assessments/">Start Assessment</a>
    </div>
  </aside>

  <!-- Cards -->
  <main>
    <div class="cards-grid" id="cardsGrid"></div>
  </main>
</div>

<div id="footer"></div>
<script src="{% static 'js/app.js' %}"></script>
<script>
const CATEGORIES = ["All","Engineering","Design","Marketing","Data Science","AI/ML","Cyber Security","Cloud Computing","Finance","Sales","HR","Operations","Content Writing","Business Development","Legal","Healthcare","Education","Hospitality","Real Estate","Fashion","Gym Trainer","Dancer","Chef"];

const MOCK_INTERNSHIPS = [
  { id:1, title:"Frontend Developer Intern", company:"TechVision India", location:"Bangalore", duration:"3 months", stipend:"₹15,000/mo", type:"Remote", category:"Engineering", skills:["React","CSS","JavaScript"], logo:"", postedAt:"2 days ago" },
  { id:2, title:"UI/UX Design Intern", company:"DesignLab", location:"Mumbai", duration:"2 months", stipend:"₹12,000/mo", type:"Hybrid", category:"Design", skills:["Figma","Sketch","Prototyping"], logo:"", postedAt:"1 day ago" },
  { id:3, title:"Data Science Intern", company:"Analytics Pro", location:"Hyderabad", duration:"6 months", stipend:"₹20,000/mo", type:"Remote", category:"Data Science", skills:["Python","SQL","Pandas"], logo:"", postedAt:"3 days ago" },
  { id:4, title:"Marketing Intern", company:"BrandBoost", location:"Delhi", duration:"3 months", stipend:"₹8,000/mo", type:"On-site", category:"Marketing", skills:["SEO","Social Media","Canva"], logo:"", postedAt:"5 days ago" },
  { id:5, title:"Backend Developer Intern", company:"CloudSystems", location:"Pune", duration:"4 months", stipend:"₹18,000/mo", type:"Remote", category:"Engineering", skills:["Node.js","Python","Docker"], logo:"", postedAt:"1 week ago" },
  { id:6, title:"AI/ML Intern", company:"DeepMind Labs", location:"Bangalore", duration:"6 months", stipend:"₹25,000/mo", type:"Remote", category:"AI/ML", skills:["Python","TensorFlow","NLP"], logo:"", postedAt:"2 days ago" },
  { id:7, title:"Finance Analyst Intern", company:"CapitalEdge", location:"Mumbai", duration:"3 months", stipend:"₹10,000/mo", type:"On-site", category:"Finance", skills:["Excel","Tableau","Accounting"], logo:"", postedAt:"4 days ago" },
  { id:8, title:"HR Intern", company:"PeopleFirst", location:"Chennai", duration:"2 months", stipend:"₹6,000/mo", type:"Hybrid", category:"HR", skills:["Recruitment","Excel","Communication"], logo:"", postedAt:"6 days ago" },
];

let currentFilter = "All";
let showRecommended = false;

function buildFilters() {
  const list = document.getElementById('filterList');
  list.innerHTML = CATEGORIES.map(c =>
    `<button class="filter-btn ${c === currentFilter ? 'active' : ''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');
}

function setFilter(cat) {
  currentFilter = cat;
  buildFilters();
  applyFilters();
}

function toggleRecommended() {
  showRecommended = !showRecommended;
  document.getElementById('toggleRecommended').classList.toggle('icon-btn--blue', showRecommended);
  applyFilters();
}

function applyFilters() {
  const term = document.getElementById('searchInput').value.toLowerCase();
  let list = MOCK_INTERNSHIPS;
  if (currentFilter !== "All") list = list.filter(i => i.category === currentFilter);
  if (term) list = list.filter(i => i.title.toLowerCase().includes(term) || i.company.toLowerCase().includes(term));
  renderCards(list);
}

function renderCards(list) {
  document.getElementById('countLabel').textContent = `Showing ${list.length} opportunities`;
  const grid = document.getElementById('cardsGrid');
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;background:#fff;border-radius:24px;border:1px solid var(--gray-200)">
      <div style="font-size:40px;margin-bottom:16px">🔍</div>
      <h3 style="font-size:1.2rem;font-weight:700;margin-bottom:8px">No internships found</h3>
      <p style="color:var(--gray-500)">Try adjusting your filters or search terms.</p>
      <button onclick="setFilter('All');document.getElementById('searchInput').value=''" style="margin-top:20px;padding:10px 24px;background:var(--gray-900);color:#fff;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:none">Clear Filters</button>
    </div>`;
    return;
  }
  grid.innerHTML = list.map(i => {
    const initials = i.company.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const skillsHtml = i.skills.map(s => `<span class="skill-tag">${s}</span>`).join('');
    return `<div class="intern-card">
      <div class="intern-card__top">
        <div>
          <div class="intern-card__title">${i.title}</div>
          <div class="intern-card__company">${i.company}</div>
        </div>
        <div class="intern-card__logo">${initials}</div>
      </div>
      <div class="intern-card__meta">
        <div class="meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${i.location}</div>
        <div class="meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${i.duration}</div>
        <div class="meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${i.stipend}</div>
        <div class="meta-item"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>${i.type}</div>
      </div>
      <div class="skills-row">${skillsHtml}</div>
      <div class="intern-card__footer">
        <span class="intern-card__date">${i.postedAt}</span>
        <a href="/internships/${i.id}/" class="view-link">View Details <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
      </div>
    </div>`;
  }).join('');
}

buildFilters();
applyFilters();
</script>
</body>
</html>
